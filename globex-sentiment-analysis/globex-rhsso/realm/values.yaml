keycloak:
  name: keycloak

selector:
  app: rhsso

hook:
  image:
    repository: quay.io/ajaaveed/rhsso-realm-hook-wait
    pullPolicy: IfNotPresent
    tag: s390x
  serviceAccount:
    create: true
    name: ""
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  maxTimeToWait: 300000
  argocd:
    enabled: true
    syncwave: "-1"
